<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Honey Demo Skeleton</title>
    <link rel="stylesheet" href="./style.css?v=20260616-perf1" />
  </head>
  <body>
    <main class="app-shell">
      <div id="game-stage-viewport" class="game-stage-viewport">
        <div id="game-stage" class="game-stage">
          <header class="hud">
            <section
              class="hud-card hud-card--primary hud-card--goals"
              id="goal-card"
              aria-label="目标剩余：小白花 12、苹果花 2、苹果 0、郁金香 4"
            >
              <div class="goal-item" data-goal="flower">
                <img class="goal-item__icon" src="assets/ui/icon_flower_01.png" alt="小白花" />
                <strong class="goal-item__num" id="goal-flower">12</strong>
                <span class="goal-item__burst" aria-hidden="true"></span>
              </div>
              <div class="goal-item" data-goal="flower-yellow">
                <img class="goal-item__icon" src="assets/ui/icon_flower_02.png" alt="小黄花" />
                <strong class="goal-item__num" id="goal-flower-yellow">0</strong>
                <span class="goal-item__burst" aria-hidden="true"></span>
              </div>
              <div class="goal-item" data-goal="flower-red">
                <img class="goal-item__icon" src="assets/ui/icon_flower_03.png" alt="小红花" />
                <strong class="goal-item__num" id="goal-flower-red">0</strong>
                <span class="goal-item__burst" aria-hidden="true"></span>
              </div>
              <div class="goal-item" data-goal="apple">
                <img class="goal-item__icon" src="assets/ui/icon_apple_01.png" alt="苹果花" />
                <strong class="goal-item__num" id="goal-apple">2</strong>
                <span class="goal-item__burst" aria-hidden="true"></span>
              </div>
              <div class="goal-item" data-goal="apple-fruit">
                <img class="goal-item__icon" src="assets/ui/icon_apple_02.png" alt="苹果" />
                <strong class="goal-item__num" id="goal-apple-fruit">0</strong>
                <span class="goal-item__burst" aria-hidden="true"></span>
              </div>
              <div class="goal-item" data-goal="tulip">
                <img class="goal-item__icon" src="assets/ui/icon_tulip_01.png" alt="郁金香" />
                <strong class="goal-item__num" id="goal-tulip">4</strong>
                <span class="goal-item__burst" aria-hidden="true"></span>
              </div>
              <div class="goal-item" data-goal="tulip-white">
                <img class="goal-item__icon" src="assets/ui/icon_tulip_03.png" alt="白色郁金香" />
                <strong class="goal-item__num" id="goal-tulip-white">0</strong>
                <span class="goal-item__burst" aria-hidden="true"></span>
              </div>
            </section>
          </header>

          <section class="board-panel">
            <div id="board-viewport" class="board-viewport">
              <div id="board" class="board" aria-label="蜂窝盘面"></div>
            </div>
            <div id="toast" class="toast" aria-live="polite"></div>
            <div id="game-over" class="game-over" hidden>
              <strong class="game-over__title">游戏结束</strong>
              <p id="game-over-summary" class="game-over__summary">总花蜜：0</p>
              <button id="restart-button" class="game-over__button" type="button">重新开始</button>
            </div>
            <div id="game-win" class="game-over game-win" hidden>
              <strong class="game-over__title game-win__title">恭喜通关！</strong>
              <p id="game-win-summary" class="game-over__summary">已达成目标：小白花 12，苹果花 2</p>
              <button id="restart-win-button" class="game-over__button" type="button">再来一局</button>
            </div>
          </section>

        </div>
        <div id="fx-overlay" class="fx-overlay" aria-hidden="true"></div>
        <div id="combo-overlay" class="combo-overlay" aria-hidden="true">
          <div id="combo-popup" class="combo-popup" hidden>
            <span class="combo-popup__label">Combo x</span><span id="combo-popup-count" class="combo-popup__count">1</span>
          </div>
        </div>
      </div>
    </main>

    <aside class="bee-counter">
      <div class="bee-counter__frame">
        <img id="bee-counter-icon" class="bee-counter__icon" src="assets/ui/cursor/cursor-default.png" alt="蜜蜂" />
      </div>
      <div class="bee-counter__number">
        <strong id="bees-left">10</strong>
      </div>
    </aside>

    <button
      id="bgm-toggle"
      class="bgm-toggle"
      type="button"
      aria-label="切换背景音乐"
      aria-pressed="false"
    >
      <span class="bgm-toggle__icon" data-state="on" aria-hidden="true">🔊</span>
      <span class="bgm-toggle__icon" data-state="off" aria-hidden="true">🔇</span>
    </button>

    <button
      id="level-select-toggle"
      class="level-select-toggle"
      type="button"
      aria-label="选关"
    >
      选关
    </button>

    <div id="level-select-overlay" class="level-select-overlay" hidden>
      <div class="level-select-panel" role="dialog" aria-labelledby="level-select-title">
        <header class="level-select-panel__header">
          <strong id="level-select-title" class="level-select-panel__title">选择关卡</strong>
          <button id="level-select-close" class="level-select-panel__close" type="button" aria-label="关闭">×</button>
        </header>
        <div id="level-select-grid" class="level-select-grid"></div>
        <p class="level-select-panel__hint">点击任意关卡可直接切换；当前关卡以高亮显示。</p>
      </div>
    </div>

    <div id="custom-cursor" class="custom-cursor" aria-hidden="true">
      <svg class="custom-cursor__ring" viewBox="0 0 100 100" aria-hidden="true">
        <circle class="custom-cursor__ring-track" cx="50" cy="50" r="46"></circle>
        <circle class="custom-cursor__ring-progress" cx="50" cy="50" r="46"></circle>
      </svg>
      <div class="custom-cursor__inner">
        <img id="custom-cursor-image" class="custom-cursor__image" src="" alt="" />
      </div>
    </div>

    <script src="./app.js?v=20260616-perf1"></script>
  </body>
</html>
